# Builds macOS release assets on Apple tooling and uploads them to an existing release.
name: Build macOS release artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and update
        required: true
        default: v1.3.0

permissions:
  contents: write

concurrency:
  group: macos-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify the requested tag
        shell: bash
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "${{ inputs.tag }}" != "$expected_tag" ]]; then
            echo "Requested tag ${{ inputs.tag }} does not match package version $expected_tag."
            exit 1
          fi

      - name: Run startup tests
        run: npm run test:startup

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build the application
        run: npm run build

      - name: Build universal macOS artifacts
        run: npx electron-builder --mac --universal --publish never --config.directories.output=release-mac

      - name: Normalize macOS artifact filenames
        shell: bash
        run: |
          for artifact in release-mac/Localhost\ Dashboard-*; do
            mv "$artifact" "${artifact// /-}"
          done

      - name: Upload macOS artifacts to the existing release
        shell: bash
        run: |
          gh release upload "${{ inputs.tag }}" \
            release-mac/*.dmg \
            release-mac/*.dmg.blockmap \
            release-mac/*.zip \
            release-mac/*.zip.blockmap \
            release-mac/latest-mac.yml \
            --repo Tanjim-Islam/localhost-dashboard \
            --clobber
