# Builds Windows release assets on Microsoft tooling and uploads them to an existing release.
name: Build Windows release artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and update
        required: true
        default: v1.3.0

permissions:
  contents: write

concurrency:
  group: windows-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify the requested tag
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $expectedTag = "v$version"
          if ("${{ inputs.tag }}" -ne $expectedTag) {
            Write-Error "Requested tag ${{ inputs.tag }} does not match package version $expectedTag."
            exit 1
          }

      - name: Run startup tests
        run: npm run test:startup

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build the application
        run: npm run build

      - name: Build Windows artifacts
        run: npx electron-builder --win --x64 --publish never --config.directories.output=release-win

      - name: Normalize Windows artifact filenames
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath release-win -File |
            Where-Object { $_.Name -like "Localhost Dashboard*" } |
            ForEach-Object {
              Rename-Item -LiteralPath $_.FullName -NewName ($_.Name -replace " ", "-")
            }

      - name: Verify Windows artifact set
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $requiredFiles = @(
            "release-win/Localhost-Dashboard-Setup-$version.exe",
            "release-win/Localhost-Dashboard-$version.exe",
            "release-win/Localhost-Dashboard-Setup-$version.exe.blockmap",
            "release-win/latest.yml"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $file)) {
              Write-Error "Required Windows release artifact is missing: $file"
              exit 1
            }
          }

      - name: Upload Windows artifacts to the existing release
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem -LiteralPath release-win -File -Filter "*.exe"
            Get-ChildItem -LiteralPath release-win -File -Filter "*.exe.blockmap"
            Get-Item -LiteralPath release-win/latest.yml
          )
          $arguments = @("release", "upload", "${{ inputs.tag }}") +
            @($files.FullName) +
            @("--repo", "Tanjim-Islam/localhost-dashboard", "--clobber")

          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
